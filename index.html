<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NikshepOS - FanCode Live</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --bg: #000000;
      --bg2: #1c1c1e;
      --bg3: #2c2c2e;
      --bg4: #3a3a3c;
      --separator: rgba(84,84,88,0.65);
      --label: #ffffff;
      --label2: rgba(235,235,245,0.6);
      --label3: rgba(235,235,245,0.3);
      --accent: #0a84ff;
      --accent2: #30d158;
      --red: #ff453a;
      --yellow: #ffd60a;
      --radius: 16px;
      --radius-sm: 10px;
      --blur: blur(40px) saturate(180%);
      --sf: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      background: var(--bg);
      color: var(--label);
      font-family: var(--sf);
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    /* ── Status bar spacer ── */
    .safe-top { height: env(safe-area-inset-top, 0px); }
    .safe-bottom { height: calc(env(safe-area-inset-bottom, 0px) + 16px); }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      background: rgba(0,0,0,0.72);
      border-bottom: 0.5px solid var(--separator);
      padding: 12px 20px 14px;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.4px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,69,58,0.18);
      border: 0.5px solid rgba(255,69,58,0.35);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      color: var(--red);
      letter-spacing: 0.3px;
    }

    .live-dot {
      width: 6px; height: 6px;
      background: var(--red);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* ── Refresh bar ── */
    .refresh-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px 0;
    }

    .refresh-info {
      font-size: 12px;
      color: var(--label3);
      letter-spacing: -0.1px;
    }

    .refresh-info span {
      color: var(--accent);
      font-weight: 500;
    }

    .refresh-progress {
      width: 80px;
      height: 2px;
      background: var(--bg3);
      border-radius: 2px;
      overflow: hidden;
    }

    .refresh-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 1s linear;
    }

    /* ── Main content ── */
    main {
      padding: 16px 16px 0;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--label3);
      letter-spacing: 0.3px;
      text-transform: uppercase;
      margin: 0 4px 10px;
    }

    /* ── Match card ── */
    .card-group {
      background: var(--bg2);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
    }

    .card {
      padding: 14px 16px;
      border-bottom: 0.5px solid var(--separator);
      animation: fadeSlideIn 0.4s ease forwards;
      opacity: 0;
    }

    .card:last-child { border-bottom: none; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .thumb-wrap {
      position: relative;
      flex-shrink: 0;
      width: 72px;
      height: 48px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg3);
    }

    .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .thumb-live-tag {
      position: absolute;
      bottom: 4px; left: 4px;
      background: var(--red);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      letter-spacing: 0.4px;
    }

    .card-meta {
      flex: 1;
      min-width: 0;
    }

    .tournament-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--label);
      line-height: 1.3;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .match-name {
      font-size: 12px;
      color: var(--label2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .category-row {
      display: flex;
      gap: 6px;
      margin-top: 5px;
    }

    .chip {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.2px;
    }

    .chip-sport {
      background: rgba(10,132,255,0.15);
      color: var(--accent);
      border: 0.5px solid rgba(10,132,255,0.3);
    }

    .chip-lang {
      background: rgba(48,209,88,0.12);
      color: var(--accent2);
      border: 0.5px solid rgba(48,209,88,0.25);
    }

    /* ── Stream URL section ── */
    .stream-section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--label3);
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .stream-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg3);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      margin-bottom: 6px;
    }

    .res-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--label);
      min-width: 44px;
    }

    .url-text {
      flex: 1;
      font-size: 11px;
      color: var(--label3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-variant-numeric: tabular-nums;
    }

    .copy-btn {
      background: rgba(10,132,255,0.18);
      border: none;
      border-radius: 7px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      padding: 5px 11px;
      cursor: pointer;
      font-family: var(--sf);
      letter-spacing: -0.2px;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    .copy-btn:active { transform: scale(0.94); background: rgba(10,132,255,0.3); }

    .copy-btn.copied {
      background: rgba(48,209,88,0.2);
      color: var(--accent2);
    }

    /* Main stream highlight */
    .main-stream {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(10,132,255,0.08);
      border: 0.5px solid rgba(10,132,255,0.25);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    .main-stream .res-label {
      color: var(--accent);
      font-size: 13px;
    }

    /* Resolutions toggle */
    .res-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      margin-bottom: 6px;
    }

    .res-toggle-label {
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
    }

    .res-toggle-arrow {
      font-size: 10px;
      color: var(--accent);
      transition: transform 0.25s;
    }

    .res-toggle-arrow.open { transform: rotate(180deg); }

    .res-list {
      display: none;
    }

    .res-list.open { display: block; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 80px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(44,44,46,0.95);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
      border: 0.5px solid var(--separator);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Loading state ── */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 14px;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid var(--bg3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 14px;
      color: var(--label3);
      font-weight: 400;
    }

    /* ── Error state ── */
    .error-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      gap: 10px;
      text-align: center;
    }

    .error-icon { font-size: 40px; }
    .error-title { font-size: 17px; font-weight: 600; }
    .error-sub { font-size: 14px; color: var(--label2); }

    .retry-btn {
      margin-top: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 11px 24px;
      font-size: 15px;
      font-weight: 600;
      font-family: var(--sf);
      cursor: pointer;
    }

    /* ── Empty state ── */
    .empty-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      gap: 10px;
      text-align: center;
    }

    .empty-icon { font-size: 48px; }
    .empty-title { font-size: 20px; font-weight: 700; }
    .empty-sub { font-size: 15px; color: var(--label2); }

    /* ── Footer / Credits ── */
    footer {
      max-width: 480px;
      margin: 8px auto 0;
      padding: 0 16px;
    }

    .credits-card {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 4px;
    }

    .credits-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0a84ff 0%, #5e5ce6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: -1px;
    }

    .credits-info { flex: 1; }

    .credits-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .credits-role {
      font-size: 12px;
      color: var(--label3);
    }

    .credits-links {
      display: flex;
      gap: 8px;
    }

    .cred-link {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--bg3);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--label2);
      text-decoration: none;
      transition: background 0.15s;
    }

    .cred-link:active { background: var(--bg4); }
    .cred-link svg { flex-shrink: 0; }

    .api-credit {
      font-size: 11px;
      color: var(--label3);
      text-align: center;
      padding: 10px 0 6px;
      letter-spacing: -0.1px;
    }

    .api-credit a {
      color: var(--label3);
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="safe-top"></div>

<header>
  <div class="header-row">
    <span class="header-title">NikshepOS ⚡ FanCode Live</span>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span id="liveCount">—</span> LIVE
    </div>
  </div>
  <div class="refresh-bar">
    <div class="refresh-info">DW links Refreshes in <span id="countdown">5:00</span></div>
    <div class="refresh-progress">
      <div class="refresh-fill" id="progressFill" style="width:100%"></div>
    </div>
  </div>
</header>

<main id="main">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div class="loading-text">Fetching live streams…</div>
  </div>
</main>

<footer id="footer" style="display:none">
  <div class="credits-card">
    <div class="credits-avatar">🙂</div>
    <div class="credits-info">
      <div class="credits-name">Nikshep</div>
      <div class="credits-role">Developer · Builder</div>
    </div>
  </div>
  <div class="credits-links" style="padding:0 0 4px; display:flex; gap:8px;">
    <a class="cred-link" href="https://instagram.com/nikkk.exe" target="_blank" rel="noopener">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
      @nikkk.exe
    </a>
    <a class="cred-link" href="https://nikshep.vercel.app" target="_blank" rel="noopener">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      Portfolio
    </a>
  </div>
  <div class="api-credit">Stream data via <a href="https://t.me/allinonereborn_amit" target="_blank">NikshepOS</a>'s FanCode Stream!</div>
  <div class="safe-bottom"></div>
</footer>

<div class="toast" id="toast">Copied!</div>

<script>
  const API = 'https://fcapi.amitbala1993.workers.dev';
  const INTERVAL = 5 * 60 * 1000; // 5 min
  let timer, countdown, remaining = INTERVAL;

  async function fetchData() {
    const main = document.getElementById('main');
    const footer = document.getElementById('footer');

    // Only show loading spinner on first load
    if (!document.querySelector('.card-group')) {
      main.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Fetching live streams…</div></div>`;
    }

    try {
      const res = await fetch(API, { cache: 'no-store' });
      if (!res.ok) throw new Error('Network error');
      const data = await res.json();

      document.getElementById('liveCount').textContent = data.live_matches ?? 0;

      if (!data.matches || data.matches.length === 0) {
        main.innerHTML = `
          <div class="empty-wrap">
            <div class="empty-icon">📺</div>
            <div class="empty-title">No Live Streams</div>
            <div class="empty-sub">Check back soon — streams will appear here when live.</div>
          </div>`;
        footer.style.display = 'block';
        return;
      }

      // Group by tournament
      const grouped = {};
      data.matches.forEach(m => {
        const key = m.tournament.trim();
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(m);
      });

      let html = '';
      let delay = 0;

      Object.entries(grouped).forEach(([tournament, matches]) => {
        const clean = tournament.replace(/ -$/, '').trim();
        html += `<div class="section-label">${escHtml(clean)}</div>`;
        html += `<div class="card-group">`;

        matches.forEach(m => {
          const thumb = m.image || '';
          const resolutions = m.all_resolutions || {};
          const resKeys = Object.keys(resolutions);

          let resRows = resKeys.map(r => `
            <div class="stream-row">
              <span class="res-label">${escHtml(r)}</span>
              <span class="url-text">${escHtml(resolutions[r])}</span>
              <button class="copy-btn" onclick="copyURL(this, '${escAttr(resolutions[r])}')">Copy</button>
            </div>
          `).join('');

          const mainURL = m.stream_url || (resolutions['1080p'] || resolutions[resKeys[resKeys.length-1]] || '');

          html += `
            <div class="card" style="animation-delay:${delay}ms">
              <div class="card-header">
                <div class="thumb-wrap">
                  ${thumb ? `<img src="${escAttr(thumb)}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
                  <span class="thumb-live-tag">LIVE</span>
                </div>
                <div class="card-meta">
                  <div class="tournament-name">${escHtml(clean)}</div>
                  <div class="match-name">${escHtml(m.match || '')}</div>
                  <div class="category-row">
                    ${m.category ? `<span class="chip chip-sport">${escHtml(m.category)}</span>` : ''}
                    ${m.language ? `<span class="chip chip-lang">${escHtml(m.language)}</span>` : ''}
                  </div>
                </div>
              </div>

              ${mainURL ? `
              <div class="stream-section-label">Main Stream (1080p)</div>
              <div class="main-stream">
                <span class="res-label" style="color:var(--accent)">🔗 URL</span>
                <span class="url-text">${escHtml(mainURL)}</span>
                <button class="copy-btn" onclick="copyURL(this, '${escAttr(mainURL)}')">Copy</button>
              </div>` : ''}

              ${resKeys.length > 1 ? `
              <div class="res-toggle" onclick="toggleRes(this)">
                <span class="res-toggle-label">All Resolutions (${resKeys.length})</span>
                <span class="res-toggle-arrow">▾</span>
              </div>
              <div class="res-list">
                ${resRows}
              </div>
              ` : resRows}
            </div>
          `;
          delay += 60;
        });

        html += `</div>`;
      });

      main.innerHTML = html;
      footer.style.display = 'block';

    } catch (e) {
      main.innerHTML = `
        <div class="error-wrap">
          <div class="error-icon">⚠️</div>
          <div class="error-title">Couldn't Load Streams</div>
          <div class="error-sub">Check your connection and try again.</div>
          <button class="retry-btn" onclick="fetchData()">Try Again</button>
        </div>`;
      document.getElementById('liveCount').textContent = '—';
    }
  }

  function toggleRes(el) {
    const arrow = el.querySelector('.res-toggle-arrow');
    const list = el.nextElementSibling;
    const isOpen = list.classList.toggle('open');
    arrow.classList.toggle('open', isOpen);
    el.querySelector('.res-toggle-label').textContent = isOpen
      ? 'Hide Resolutions'
      : `All Resolutions (${list.querySelectorAll('.stream-row').length})`;
  }

  function copyURL(btn, url) {
    navigator.clipboard.writeText(url).then(() => {
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      showToast('Link copied!');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    }).catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = url;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      showToast('Link copied!');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // Countdown timer
  function startCountdown() {
    remaining = INTERVAL;
    clearInterval(timer);

    timer = setInterval(() => {
      remaining -= 1000;
      if (remaining <= 0) {
        remaining = INTERVAL;
        fetchData();
      }

      const mins = Math.floor(remaining / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);
      document.getElementById('countdown').textContent =
        `${mins}:${secs.toString().padStart(2,'0')}`;

      const pct = (remaining / INTERVAL) * 100;
      document.getElementById('progressFill').style.width = pct + '%';
    }, 1000);
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escAttr(s) {
    return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
  }

  fetchData();
  startCountdown();
</script>
</body>
</html>
